<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yte360 - Trang Chủ (Localhost)</title>
    <script src="/static/tinode.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="navbar">
        <div class="logo">🏥 Yte360 (Mobile)</div>
        <div class="user-info" id="navAuth">
            <a href="/login" class="nav-btn">Đăng Nhập</a>
            <a href="/register" class="nav-btn"
                style="background:transparent; color:white; border:1px solid white;">Đăng Ký</a>
        </div>
    </div>

    <div class="hero">
        <h1 id="greeting">Hệ thống Y Tế Thông Minh</h1>
        <p>Giải pháp tư vấn và quản lý y tế toàn diện Yte360.<br>Chat ngay với trợ lý ảo AI để được hỗ trợ 24/7.</p>
        <img src="https://cdn-icons-png.flaticon.com/512/3063/3063176.png" width="180">
    </div>

    <div class="chat-toggle" onclick="toggleChat()">☎</div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div class="title">
                <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" width="24"
                    style="filter: brightness(0) invert(1);">
                Trợ lý Yte360
            </div>
            <div class="header-controls">
                <span class="status-dot" id="status" title="Connecting..."></span>
                <span class="close-chat-btn" onclick="toggleChat()">✕</span>
            </div>
        </div>

        <div class="chat-body" id="messages"></div>

        <div class="quick-menu-popup" id="quickMenu">
            <button onclick="sendQuickAction('📅 Đặt lịch khám')">📅 Đặt lịch khám</button>
            <button onclick="sendQuickAction('🔢 Số chờ hiện tại')">🔢 Số chờ (Siêu âm)</button>
            <button onclick="sendQuickAction('💊 Tra cứu thuốc')">💊 Tra cứu thuốc</button>
            <button onclick="sendQuickAction('📋 Hướng dẫn sử dụng')">📋 Hướng dẫn</button>
            <button onclick="sendQuickAction('💰 Bảng giá dịch vụ')">💰 Bảng giá</button>
            <button onclick="sendQuickAction('🏥 Danh sách bệnh viện')">🏥 Bệnh viện</button>
        </div>

        <div class="typing-container" id="typingIndicator">
            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="bot-avatar">
            <div class="typing-bubble"><span></span><span></span><span></span></div>
        </div>

        <div class="chat-footer">
            <button class="menu-toggle-btn" onclick="toggleQuickMenu()" title="Menu nhanh">☰</button>
            <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." disabled>
            <button id="sendBtn" class="send-btn" onclick="handleSend()" disabled>➤</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
