<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Yte360 (Local)</title>
    <script src="/static/tinode.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-body">
    <div class="auth-card">
        <h2>Tạo Tài Khoản Yte360</h2>

        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" class="auth-input" placeholder="vd: user123">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" class="auth-input" placeholder="******">
        </div>

        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="fullname" class="auth-input" placeholder="vd: Nguyễn Văn A">
        </div>

        <button onclick="processRegister()" id="regBtn" class="auth-btn">ĐĂNG KÝ NGAY</button>
        <div id="statusMsg"></div>

        <div class="auth-link">
            Đã có tài khoản? <a href="/login">Đăng nhập</a>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
